<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unholycucumber Vault</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        video { width: 100%; border: 2px solid #0f0; box-shadow: 0 0 15px #0f0; border-radius: 8px; background: #111; }
        #playlist { margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .song-btn { background: #111; color: #0f0; border: 1px solid #0f0; padding: 10px; cursor: pointer; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .song-btn:hover { background: #0f0; color: #000; }
        .playing { background: #0f0 !important; color: #000 !important; font-weight: bold; }
        #status { margin: 15px 0; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <h1>☣️ UNHOLYCUCUMBER VAULT ☣️</h1>
    
    <video id="mainPlayer" controls></video>
    <div id="status">Scanning Vault...</div>

    <div id="playlist"></div>
</div>

<script>
    // --- 1. SET YOUR GITHUB INFO HERE ---
    const username = "nobody178-web"; // Update if your username is different
    const repo = "my-music";         // Update if your repo name is different
    const folder = "Rave_Ready_Videos";

    const player = document.getElementById('mainPlayer');
    const statusLabel = document.getElementById('status');
    const playlistDiv = document.getElementById('playlist');
    
    let songs = [];
    let currentIndex = 0;

    // --- 2. FETCH THE DATA FROM GITHUB API ---
    async function fetchVaultContents() {
        const url = `https://api.github.com/repos/${username}/${repo}/contents/${folder}`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            
            // Filter only for .mp4 files
            songs = data
                .filter(item => item.name.toLowerCase().endsWith('.mp4'))
                .map(item => item.name);

            if (songs.length === 0) {
                statusLabel.innerText = "Error: No .mp4 files found in " + folder;
            } else {
                renderPlaylist();
                loadSong(0);
            }
        } catch (err) {
            statusLabel.innerText = "Error connecting to GitHub API.";
            console.error(err);
        }
    }

    function renderPlaylist() {
        playlistDiv.innerHTML = "";
        songs.forEach((song, i) => {
            const btn = document.createElement('button');
            btn.className = "song-btn";
            btn.innerText = (i + 1) + ". " + song.replace('.mp4', '');
            btn.onclick = () => loadSong(i);
            playlistDiv.appendChild(btn);
        });
    }

    function loadSong(index) {
        if (index >= songs.length) index = 0;
        currentIndex = index;
        
        player.src = `${folder}/${songs[currentIndex]}`;
        statusLabel.innerText = "NOW PLAYING: " + songs[currentIndex];
        
        document.querySelectorAll('.song-btn').forEach((btn, i) => {
            btn.classList.toggle('playing', i === currentIndex);
        });

        player.load();
        player.play().catch(() => statusLabel.innerText = "Ready to Play: " + songs[currentIndex]);
    }

    // --- 3. AUTO-PLAY NEXT SONG ---
    player.onended = () => {
        console.log("Song finished, loading next...");
        loadSong(currentIndex + 1);
    };

    // Start the process
    fetchVaultContents();
</script>

</body>
</html>
