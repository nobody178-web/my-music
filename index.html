<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moiz's Music Vault</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        body { background: #0b0b0b; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; padding-bottom: 160px; }
        h1 { color: #1DB954; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; }
        .card { background: #181818; padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid transparent; }
        .card:hover { border-color: #1DB954; background: #222; }
        .cover { width: 100%; aspect-ratio: 1; border-radius: 6px; object-fit: cover; background: #333; margin-bottom: 8px; }
        .title { font-size: 0.8rem; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* PLAYER AREA */
        .player-container { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #000; border-top: 1px solid #333; 
            display: flex; flex-direction: column; align-items: center; padding: 10px; box-sizing: border-box;
        }
        video { width: 100%; max-width: 350px; height: 200px; border-radius: 10px; background: #111; }
        #song-info { color: #1DB954; font-size: 0.85rem; margin-bottom: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Your Library</h1>
    <div class="grid" id="library"></div>
