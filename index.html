<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unholycucumber Vault</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; margin: 0; padding: 20px; }
        .vault-container { max-width: 600px; margin: auto; }
        /* A large, visible player helps the Rave scraper */
        video { width: 100%; border: 2px solid #0f0; background: #111; display: block; }
        .song-btn { background: #111; color: #0f0; border: 1px solid #0f0; padding: 10px; margin: 5px; width: 100%; cursor: pointer; }
        .playing { background: #0f0; color: #000; font-weight: bold; }
    </style>
</head>
<body>

<div class="vault-container">
    <h1>☣️ UNHOLYCUCUMBER VAULT ☣️</h1>

    <video id="mainPlayer" controls autoplay muted playsinline>
        <source src="Rave_Ready_Videos/1-01 Rocket Love.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div id="status">UNRESTRICTED ACCESS</div>
    <div id="playlist"></div>
</div>

<script>
    // 2. MANUALLY LIST YOUR TOP 5 SONGS HERE
    const songs = [
        "1-01 Rocket Love.mp4",
        "1-05 Voodoo.mp4",
        "2-06 Girlfriend_s Best Friend.mp4",
        "2-07 Good Decoration.mp4",
        "2-08 Analog 2.mp4"
    ];

    const folder = "Rave_Ready_Videos/";
    let currentIndex = 0;
    const player = document.getElementById('mainPlayer');
    const status = document.getElementById('status');
    const list = document.getElementById('playlist');

    function loadSong(index) {
        if (index >= songs.length) index = 0;
        currentIndex = index;
        
        // When we switch, we un-mute it so you can actually hear it
        player.muted = false; 
        player.src = folder + songs[currentIndex];
        status.innerText = "PLAYING: " + songs[currentIndex];
        
        document.querySelectorAll('.song-btn').forEach((btn, i) => {
            btn.classList.toggle('playing', i === currentIndex);
        });

        player.load();
        player.play();
    }

    // AUTO-NEXT
    player.onended = () => loadSong(currentIndex + 1);

    // Create buttons
    songs.forEach((song, i) => {
        const btn = document.createElement('button');
        btn.className = "song-btn";
        btn.innerText = (i + 1) + ". " + song;
        btn.onclick = () => loadSong(i);
        list.appendChild(btn);
    });
</script>

</body>
</html>
