<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unholycucumber Vault</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        .art-box { width: 280px; height: 280px; margin: 20px auto; border: 2px solid #0f0; box-shadow: 0 0 20px #0f0; background: url('mega_cover.jpg') center/cover; }
        h1 { font-size: 1.5rem; letter-spacing: 3px; margin-top: 10px; }
        audio { width: 100%; margin: 20px 0; filter: invert(1) hue-rotate(90deg); }
        .playlist { text-align: left; background: #111; border: 1px solid #333; border-radius: 5px; max-height: 450px; overflow-y: auto; }
        .track { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; display: flex; justify-content: space-between; font-size: 0.9rem; }
        .track:hover { background: #0f02; }
        .active { color: #fff; background: #0f04 !important; border-left: 4px solid #0f0; }
        #status { font-size: 0.8rem; color: #888; margin-top: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h1>☣️ UNHOLYCUCUMBER VAULT ☣️</h1>
    <div class="art-box"></div>
    <div id="status">VAULT ONLINE</div>

    <audio id="audioPlayer" controls playsinline></audio>

    <div class="playlist" id="trackList"></div>
</div>

<script src="playlist.js"></script>

<script>
    const folder = "Rave_Ready_Videos";
    const player = document.getElementById('audioPlayer');
    const statusBox = document.getElementById('status');
    const trackList = document.getElementById('trackList');
    let currentIndex = 0;

    function renderPlaylist() {
        trackList.innerHTML = "";
        // 'songs' comes from your playlist.js file
        songs.forEach((song, i) => {
            const item = document.createElement('div');
            item.className = 'track';
            const displayName = song.replace('.mp4', '');
            item.innerHTML = `<span>${i + 1}. ${displayName}</span><span>▶</span>`;
            item.onclick = () => playTrack(i);
            trackList.appendChild(item);
        });
    }

    function playTrack(index) {
        if (index >= songs.length) index = 0; 
        currentIndex = index;

        // Pathing with URL encoding for special characters (like '&' or spaces)
        player.src = folder + "/" + encodeURIComponent(songs[index]);
        
        player.load();
        player.play().catch(e => {
            statusBox.innerText = "TAP TO START PLAYBACK";
        });
        
        statusBox.innerText = "PLAYING: " + songs[index].replace('.mp4', '');

        // UPDATE LOCK SCREEN (iOS/Android)
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: songs[index].replace('.mp4', ''),
                artist: 'Unholycucumber',
                artwork: [{ src: 'mega_cover.jpg', sizes: '512x512', type: 'image/jpg' }]
            });
        }

        document.querySelectorAll('.track').forEach((t, i) => {
            t.classList.toggle('active', i === index);
        });
    }

    // This makes it play one by one automatically!
    player.onended = () => {
        playTrack(currentIndex + 1);
    };

    // Start the UI
    if (typeof songs !== 'undefined') {
        renderPlaylist();
    } else {
        statusBox.innerText = "ERROR: PLAYLIST.JS NOT FOUND";
    }
</script>

</body>
</html>
