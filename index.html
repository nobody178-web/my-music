<script src="playlist.js"></script>

<script>
    // Now 'songs' is automatically loaded from playlist.js!
    const folderPath = "Rave_Ready_Videos/";
    let currentIndex = 0;
    
    const player = document.getElementById('mainPlayer');
    const source = document.getElementById('videoSource');
    const label = document.getElementById('nowPlaying');
    const playlistDiv = document.getElementById('playlist');

    function loadSong(index) {
        if (index >= songs.length) index = 0;
        currentIndex = index;
        
        source.src = folderPath + songs[currentIndex];
        label.innerText = "NOW PLAYING: " + songs[currentIndex];
        
        document.querySelectorAll('.song-btn').forEach((btn, i) => {
            btn.classList.toggle('playing', i === currentIndex);
        });

        player.load();
        player.play();
    }

    player.onended = () => loadSong(currentIndex + 1);

    // Create UI buttons dynamically from the list
    songs.forEach((song, i) => {
        const btn = document.createElement('button');
        btn.className = "song-btn";
        btn.innerText = (i + 1) + ". " + song.replace('.mp4', '');
        btn.onclick = () => loadSong(i);
        playlistDiv.appendChild(btn);
    });

    loadSong(0);
</script>
