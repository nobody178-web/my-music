<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unholycucumber Vault</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; margin: 0; padding: 20px; }
        .vault-container { max-width: 600px; margin: auto; }
        /* The video must be visible and large for Rave to 'see' it */
        video { width: 100%; height: auto; border: 2px solid #0f0; background: #111; display: block; }
        #playlist { margin-top: 20px; border-top: 1px solid #444; padding-top: 10px; }
        .track { background: #111; color: #0f0; border: 1px solid #333; padding: 12px; margin: 5px 0; width: 100%; cursor: pointer; text-align: left; }
        .track.active { background: #0f0; color: #000; font-weight: bold; }
        .controls { margin: 10px 0; display: flex; justify-content: space-around; }
        button.nav { background: #222; color: #0f0; border: 1px solid #0f0; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="vault-container">
    <h1>☣️ UNHOLYCUCUMBER ☣️</h1>

    <video id="vPlayer" controls autoplay playsinline preload="auto">
        <source src="Rave_Ready_Videos/1-01 Rocket Love.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div class="controls">
        <button class="nav" onclick="playNext(-1)">PREV</button>
        <button class="nav" onclick="playNext(1)">NEXT</button>
    </div>

    <div id="status">UNRESTRICTED ACCESS</div>
    <div id="playlist"></div>
</div>

<script>
    // 2. LIST ALL YOUR FILENAMES EXACTLY
    const songs = [
        "1-01 Rocket Love.mp4",
        "1-05 Voodoo.mp4",
        "2-06 Girlfriend_s Best Friend.mp4",
        "2-07 Good Decoration.mp4"
        // Add all 10+ here
    ];

    const folder = "Rave_Ready_Videos/";
    let currentIdx = 0;
    const v = document.getElementById('vPlayer');
    const s = document.getElementById('status');
    const p = document.getElementById('playlist');

    function loadTrack(i) {
        if (i < 0) i = songs.length - 1;
        if (i >= songs.length) i = 0;
        currentIdx = i;

        // Update Source
        v.src = folder + songs[currentIdx];
        s.innerText = "PLAYING: " + songs[currentIdx];
        
        // Update Buttons
        document.querySelectorAll('.track').forEach((btn, idx) => {
            btn.className = (idx === currentIdx) ? "track active" : "track";
        });

        v.load();
        v.play();
    }

    function playNext(step) {
        loadTrack(currentIdx + step);
    }

    // THE AUTO-PLAY LOGIC
    v.onended = () => playNext(1);

    // Initial UI Build
    songs.forEach((name, i) => {
        const btn = document.createElement('button');
        btn.className = i === 0 ? "track active" : "track";
        btn.innerText = name.replace('.mp4', '');
        btn.onclick = () => loadTrack(i);
        p.appendChild(btn);
    });
</script>

</body>
</html>
