<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moiz's Music Vault</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        body { background: #0b0b0b; color: #fff; font-family: sans-serif; margin: 0; padding: 20px; padding-bottom: 140px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card { background: #181818; padding: 12px; border-radius: 10px; text-align: center; cursor: pointer; }
        .cover { width: 100%; aspect-ratio: 1; border-radius: 6px; object-fit: cover; background: #333; margin-bottom: 8px; }
        
        /* THE VIDEO PLAYER AREA */
        .player-container { 
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: #000; border-top: 1px solid #333; 
            display: flex; flex-direction: column; align-items: center; padding: 10px;
        }
        video { width: 100%; max-width: 400px; height: auto; border-radius: 10px; background: #000; }
        #song-info { color: #1DB954; font-size: 0.8rem; margin: 5px 0; }
    </style>
</head>
<body>

    <h1>Your Library</h1>
    <div class="grid" id="library"></div>

    <div class="player-container">
        <div id="song-info">Select a track...</div>
        <video id="main-player" controls playsinline></video>
    </div>

    <script>
        const folder = "unreleased misc/"; 
        const songFiles = [
            "1-01 Rocket Love.m4a", "1-02 Time Machine.m4a", "1-03 Heartbreak & Jet Lag.m4a",
            "1-04 Bedtime Story.m4a", "1-05 Voodoo.m4a", "1-06 White.m4a",
            "1-07 No Love.m4a", "1-08 4 Tears.m4a", "1-09 Acura Integurl.m4a",
            "1-10 Analog 2 (feat. Tyler, the Creator & Syd).m4a"
        ];

        const library = document.getElementById('library');
        const player = document.getElementById('main-player');
        const info = document.getElementById('song-info');

        songFiles.forEach(fileName => {
            const safePath = encodeURI(folder + fileName);

            window.jsmediatags.read(safePath, {
                onSuccess: function(tag) {
                    const { picture } = tag.tags;
                    let artUrl = "https://via.placeholder.com/400?text=Music";
                    if (picture) {
                        const { data, format } = picture;
                        let base = "";
                        for (let i = 0; i < data.length; i++) base += String.fromCharCode(data[i]);
                        artUrl = `data:${format};base64,${window.btoa(base)}`;
                    }
                    createCard(safePath, fileName, artUrl);
                },
                onError: () => createCard(safePath, fileName, "https://via.placeholder.com/400?text=Music")
            });
        });

        function createCard(path, name, img) {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => {
                player.src = path;
                player.poster = img; // Sets the album cover as the "video" background
                info.innerText = "Playing: " + name;
                player.play();
            };
            card.innerHTML = `<img src="${img}" class="cover"><span>${name}</span>`;
            library.appendChild(card);
        }
    </script>
</body>
</html>
