<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unholycucumber Vault</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: auto; }
        video { width: 100%; border: 2px solid #0f0; box-shadow: 0 0 15px #0f0; background: #111; }
        #playlist { margin-top: 20px; display: flex; flex-direction: column; gap: 5px; }
        .song-btn { background: #111; color: #0f0; border: 1px solid #0f0; padding: 12px; cursor: pointer; text-align: left; }
        .song-btn:hover { background: #0f0; color: #000; }
        .playing { background: #0f0 !important; color: #000 !important; font-weight: bold; }
        #status { margin: 15px; font-size: 1.1em; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h1>☣️ UNHOLYCUCUMBER VAULT ☣️</h1>
    
    <video id="mainPlayer" controls autoplay playsinline>
        <source id="videoSource" src="Rave_Ready_Videos/1-05 Voodoo.mp4" type="video/mp4">
    </video>

    <div id="status">Ready to play</div>
    <div id="playlist"></div>
</div>

<script>
    const folder = "Rave_Ready_Videos/";
    
    // 1. ADD YOUR SONG FILENAMES HERE MANUALLY
    const songs = [
        "1-05 Voodoo.mp4",
        "2-06 Girlfriend_s Best Friend.mp4",
        "2-07 Good Decoration.mp4",
        "1-01 Rocket Love.mp4"
    ];

    let currentIndex = 0;
    const player = document.getElementById('mainPlayer');
    const source = document.getElementById('videoSource');
    const statusLabel = document.getElementById('status');
    const playlistDiv = document.getElementById('playlist');

    function loadSong(index) {
        if (index >= songs.length) index = 0;
        currentIndex = index;
        
        const songName = songs[currentIndex];
        player.src = folder + songName;
        statusLabel.innerText = "NOW PLAYING: " + songName;
        
        // Update UI
        document.querySelectorAll('.song-btn').forEach((btn, i) => {
            btn.classList.toggle('playing', i === currentIndex);
        });

        player.load();
        player.play().catch(e => console.log("Autoplay blocked. Tap play."));
    }

    // THE AUTO-NEXT LOGIC
    player.onended = () => {
        console.log("Track finished. Loading next...");
        loadSong(currentIndex + 1);
    };

    // Generate Buttons
    songs.forEach((song, i) => {
        const btn = document.createElement('button');
        btn.className = "song-btn";
        btn.innerText = (i + 1) + ". " + song.replace('.mp4', '');
        btn.onclick = () => loadSong(i);
        playlistDiv.appendChild(btn);
    });

    // Initialize UI highlight for the first song
    document.addEventListener('DOMContentLoaded', () => {
        statusLabel.innerText = "NOW PLAYING: " + songs[0];
        document.querySelectorAll('.song-btn')[0].classList.add('playing');
    });
</script>

</body>
</html>
