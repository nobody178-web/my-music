<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unholycucumber Vault</title>
    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; text-align: center; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: auto; }
        .art-box { width: 280px; height: 280px; margin: 20px auto; border: 2px solid #0f0; box-shadow: 0 0 20px #0f0; background: url('mega_cover.jpg') center/cover; }
        h1 { font-size: 1.5rem; letter-spacing: 3px; margin-top: 10px; }
        audio { width: 100%; margin: 20px 0; filter: invert(1) hue-rotate(90deg); }
        .playlist { text-align: left; background: #111; border: 1px solid #333; border-radius: 5px; max-height: 450px; overflow-y: auto; }
        .track { padding: 15px; border-bottom: 1px solid #222; cursor: pointer; display: flex; justify-content: space-between; transition: 0.2s; }
        .track:hover { background: #0f02; }
        .active { color: #fff; background: #0f04 !important; border-left: 4px solid #0f0; }
        #status { font-size: 0.8rem; color: #888; margin-top: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h1>☣️ UNHOLYCUCUMBER VAULT ☣️</h1>
    
    <div class="art-box"></div>
    <div id="status">ACCESSING MEDIA SERVER...</div>

    <audio id="audioPlayer" controls playsinline></audio>

    <div class="playlist" id="trackList">
        </div>
</div>

<script>
    const user = "nobody178-web";
    const repo = "my-music";
    const folder = "Rave_Ready_Videos";
    
    const player = document.getElementById('audioPlayer');
    const status = document.getElementById('status');
    const trackList = document.getElementById('trackList');

    let songs = [];
    let currentIndex = 0;

    // 1. FETCH THE DATA (This works even with LFS files)
    async function loadVault() {
        try {
            const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${folder}`);
            const data = await res.json();
            
            // Filter only .mp4 files
            songs = data.filter(f => f.name.toLowerCase().endsWith('.mp4')).map(f => f.name);
            
            renderPlaylist();
            status.innerText = `${songs.length} TRACKS LOADED`;
        } catch (err) {
            status.innerText = "CONNECTION FAILED";
        }
    }

    function renderPlaylist() {
        trackList.innerHTML = "";
        songs.forEach((song, i) => {
            const item = document.createElement('div');
            item.className = 'track';
            item.innerHTML = `<span>${i + 1}. ${song.replace('.mp4', '')}</span><span>▶</span>`;
            item.onclick = () => playTrack(i);
            trackList.appendChild(item);
        });
    }

    function playTrack(index) {
        if (index >= songs.length) index = 0; // Loop back to start
        currentIndex = index;

        // THE FIX: Direct 'Media' link to bypass the LFS Pointer error
        const mediaUrl = `https://media.githubusercontent.com/media/${user}/${repo}/main/${folder}/${songs[index]}`;
        
        player.src = mediaUrl;
        player.load();
        player.play().catch(e => {
            status.innerText = "TAP PLAY TO START";
        });
        
        status.innerText = "PLAYING: " + songs[index].replace('.mp4', '');

        // UPDATE LOCK SCREEN (iOS/Android)
        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: songs[index].replace('.mp4', ''),
                artist: 'Unholycucumber',
                artwork: [{ src: 'mega_cover.jpg', sizes: '512x512', type: 'image/jpg' }]
            });
        }

        // Highlight active track in UI
        document.querySelectorAll('.track').forEach((t, i) => {
            t.classList.toggle('active', i === index);
        });
    }

    // AUTO-NEXT: This is what makes it play one by one automatically
    player.onended = () => {
        console.log("Track finished. Moving to next...");
        playTrack(currentIndex + 1);
    };

    loadVault();
</script>

</body>
</html>
