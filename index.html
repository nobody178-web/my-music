<script>
    const user = "nobody178-web";
    const repo = "my-music";
    const folder = "Rave_Ready_Videos";
    
    const player = document.getElementById('audioPlayer');
    const status = document.getElementById('status');
    const trackList = document.getElementById('trackList');

    let songs = [];
    let currentIndex = 0;

    async function loadVault() {
        try {
            // We use the API to get the names...
            const res = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/${folder}`);
            const data = await res.json();
            songs = data.filter(f => f.name.toLowerCase().endswith('.mp4')).map(f => f.name);
            renderPlaylist();
            status.innerText = `${songs.length} TRACKS READY`;
        } catch (err) {
            status.innerText = "OFFLINE MODE";
        }
    }

    function renderPlaylist() {
        trackList.innerHTML = "";
        songs.forEach((song, i) => {
            const item = document.createElement('div');
            item.className = 'track';
            item.innerHTML = `<span>${i + 1}. ${song.replace('.mp4', '')}</span><span>▶</span>`;
            item.onclick = () => playTrack(i);
            trackList.appendChild(item);
        });
    }

    function playTrack(index) {
        currentIndex = index;
        
        // --- THE FIX ---
        // Instead of the 'media' URL, we use the local path. 
        // This works because the website and the videos are in the same repo.
        player.src = `${folder}/${songs[index]}`;
        
        player.load();
        player.play().catch(e => {
            status.innerText = "TAP TO PLAY";
            console.log("Autoplay prevented:", e);
        });
        
        status.innerText = "PLAYING: " + songs[index];

        if ('mediaSession' in navigator) {
            navigator.mediaSession.metadata = new MediaMetadata({
                title: songs[index].replace('.mp4', ''),
                artist: 'Unholycucumber',
                artwork: [{ src: 'mega_cover.jpg', sizes: '512x512', type: 'image/jpg' }]
            });
        }

        document.querySelectorAll('.track').forEach((t, i) => {
            t.classList.toggle('active', i === index);
        });
    }

    player.onended = () => playTrack(currentIndex + 1);

    loadVault();
</script>
